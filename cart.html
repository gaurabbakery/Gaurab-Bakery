<!DOCTYPE html>
<html>
<head>
<title>Cart</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 style="text-align:center;">Your Cart</h1>

<div class="grid" id="cartBox"></div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function render(){
  let box = document.getElementById("cartBox");

  if(cart.length === 0){
    box.innerHTML = "<p style='text-align:center;'>Cart is empty</p>";
    return;
  }

  box.innerHTML = cart.map((item,i)=>`
    <div class="card">

      <div class="img-wrap">
        <img src="${item.img}">
      </div>

      <div class="content">
        <h2>${item.name}</h2>
        <p>${item.price}</p>

        <button onclick='orderNow(${JSON.stringify(item)})'
        style="background:black;color:white;margin-top:10px;">
          Order Now
        </button>

        <button onclick="removeItem(${i})"
        style="background:red;margin-top:10px;">
          Remove
        </button>

      </div>

    </div>
  `).join("");
}

function removeItem(i){
  cart.splice(i,1);
  localStorage.setItem("cart", JSON.stringify(cart));
  render();
}

function orderNow(item){
  let phone = "9779860228877";
  let text = `I want to order:\n${item.name}\nPrice: ${item.price}`;
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(text)}`);
}

render();
</script>

</body>
</html>
